services:
  - type: web
    name: attendpro
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DATA_DIR
        value: /var/data
    disk:
      name: attendpro-data
      mountPath: /var/data
      sizeGB: 1
